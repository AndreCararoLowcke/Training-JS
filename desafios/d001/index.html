<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3botoes</title>
    <style>
        body {
            font: 12pt Arial;
        }
        
        button {
            font-size: 12pt;
            padding: 30px;
        }
    </style>
</head>

<body>
    <h1>Interagindo com um botão</h1>
    <button onclick="clicou1()">Clica em mim1 </button>
    <button onclick="clicou2()">Clica em mim2 </button>
    <button onclick="clicou3()">Clica em mim3</button>
    <script>
        function clicou1() {
            window.alert('voce clicou no botao1')
        }

        function clicou2() {
            window.alert('voce clicou no botao2')
        }

        function clicou3() {
            window.alert('voce clicou no botao3')
        }
    </script>

</body>

</html>
